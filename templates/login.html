<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - RTRP Telemetry Console</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f766e">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap');
        
        :root {
            --brand: #0f766e;
            --brand-2: #0ea5a4;
            --ink-900: #0f172a;
            --ink-500: #64748b;
            --paper: #ffffff;
            --line: #dbe4ee;
            --cloud: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sora', sans-serif;
            background: linear-gradient(135deg, rgba(15,118,110,0.1), rgba(14,165,164,0.1)), var(--cloud);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--paper);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--line);
        }

        .login-card h2 {
            font-size: 28px;
            color: var(--brand);
            margin-bottom: 8px;
            text-align: center;
        }
        
        .login-card p {
            text-align: center;
            color: var(--ink-500);
            margin-bottom: 24px;
            font-size: 14px;
        }

        .input-group { margin-bottom: 16px; }
        
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-900);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--brand), var(--brand-2));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        
        button:hover { opacity: 0.9; }

        .flash-messages { margin-bottom: 20px; }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .alert-danger { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .alert-success { background: #dcfce3; color: #15803d; border: 1px solid #bbf7d0; }
        .alert-warning { background: #fef9c3; color: #b45309; border: 1px solid #fef08a; }
        .alert-info { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>RTRP Console</h2>
        <p>Telemetry & Monitoring Access</p>
        
        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form method="POST" action="/login">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
